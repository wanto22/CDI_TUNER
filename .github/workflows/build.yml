name: Build NTECH CDI Tuner APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract ZIP
        run: |
          unzip NtechCDI_src.zip
          ls -la
          echo "--- Extracted contents ---"
          find NtechCDI -type f | head -40

      - name: Generate drawables + icons
        run: |
          python3 << 'PYEOF'
          import os, zlib, struct, math

          dr = 'NtechCDI/app/src/main/res/drawable'
          os.makedirs(dr, exist_ok=True)

          xmls = {
              'card_bg.xml': '''<?xml version="1.0" encoding="utf-8"?>
<shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
    <solid android:color="#1A1A2E"/>
    <corners android:radius="12dp"/>
</shape>''',
              'btn_orange.xml': '''<?xml version="1.0" encoding="utf-8"?>
<shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
    <solid android:color="#FF6B00"/>
    <corners android:radius="8dp"/>
</shape>''',
              'btn_green.xml': '''<?xml version="1.0" encoding="utf-8"?>
<shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
    <solid android:color="#388E3C"/>
    <corners android:radius="8dp"/>
</shape>''',
              'btn_red.xml': '''<?xml version="1.0" encoding="utf-8"?>
<shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
    <solid android:color="#C62828"/>
    <corners android:radius="8dp"/>
</shape>''',
              'btn_purple.xml': '''<?xml version="1.0" encoding="utf-8"?>
<shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
    <solid android:color="#6A1B9A"/>
    <corners android:radius="8dp"/>
</shape>''',
              'btn_outline.xml': '''<?xml version="1.0" encoding="utf-8"?>
<shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
    <stroke android:width="1dp" android:color="#FF6B00"/>
    <corners android:radius="8dp"/>
    <solid android:color="#00000000"/>
</shape>''',
              'input_bg.xml': '''<?xml version="1.0" encoding="utf-8"?>
<shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
    <solid android:color="#0D0D0D"/>
    <stroke android:width="1dp" android:color="#333333"/>
    <corners android:radius="6dp"/>
</shape>'''
          }
          for fname, content in xmls.items():
              open(os.path.join(dr, fname), 'w').write(content)

          # Launcher icons
          def make_icon_png(size):
              def chunk(name, data):
                  c = name + data
                  return struct.pack('>I', len(data)) + c + struct.pack('>I', zlib.crc32(c) & 0xffffffff)
              sig  = b'\x89PNG\r\n\x1a\n'
              ihdr = chunk(b'IHDR', struct.pack('>IIBBBBB', size, size, 8, 2, 0, 0, 0))
              cx, cy = size//2, size//2
              rows = []
              for y in range(size):
                  row = b'\x00'
                  for x in range(size):
                      dx, dy = x-cx, y-cy
                      dist = math.sqrt(dx*dx + dy*dy)
                      r = size//2 - 2
                      if dist > r:
                          row += b'\x0D\x0D\x0D'
                      elif dist > r-8:
                          row += b'\xFF\x6B\x00'
                      else:
                          ang = math.atan2(dy, dx)
                          tooth = int((ang + math.pi) / (2*math.pi) * 12)
                          if dist > r-18 and tooth % 2 == 0:
                              row += b'\xFF\x6B\x00'
                          elif dist < r*0.4:
                              row += b'\xFF\x6B\x00'
                          else:
                              row += b'\x1A\x1A\x2E'
                  rows.append(row)
              raw  = b''.join(rows)
              idat = chunk(b'IDAT', zlib.compress(raw))
              iend = chunk(b'IEND', b'')
              return sig + ihdr + idat + iend

          sizes = {
              'mipmap-mdpi':48,'mipmap-hdpi':72,
              'mipmap-xhdpi':96,'mipmap-xxhdpi':144,'mipmap-xxxhdpi':192
          }
          base = 'NtechCDI/app/src/main/res'
          for folder, size in sizes.items():
              path = os.path.join(base, folder)
              os.makedirs(path, exist_ok=True)
              png = make_icon_png(size)
              open(os.path.join(path, 'ic_launcher.png'), 'wb').write(png)
              open(os.path.join(path, 'ic_launcher_round.png'), 'wb').write(png)

          print("All assets generated!")
          PYEOF

      - name: Create project-level build files
        run: |
          cat > NtechCDI/build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.0'
                  classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.10'
              }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat > NtechCDI/settings.gradle << 'EOF'
          rootProject.name = "NtechCDI"
          include ':app'
          EOF

          cat > NtechCDI/gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          EOF

      - name: Fix XML ampersands
        run: |
          python3 << 'PYEOF'
          import os, re
          for root, _, files in os.walk('NtechCDI/app/src/main/res'):
              for f in files:
                  if f.endswith('.xml'):
                      p = os.path.join(root, f)
                      c = open(p, encoding='utf-8').read()
                      fixed = re.sub(r'&(?!(amp|lt|gt|quot|apos|#)\w*;)', '&amp;', c)
                      open(p, 'w', encoding='utf-8').write(fixed)
          print("XML fixed!")
          PYEOF

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle Wrapper
        run: |
          cd NtechCDI
          gradle wrapper --gradle-version 8.2

      - name: Make gradlew executable
        run: chmod +x NtechCDI/gradlew

      - name: Build APK
        run: |
          cd NtechCDI
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NTECH-CDI-Tuner-APK
          path: NtechCDI/app/build/outputs/apk/debug/app-debug.apk
