name: Build CDI Tuner APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract ZIP project
        run: unzip CDI_Tuner_App.zip

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Fix build.gradle
        run: |
          cat > CDI_Tuner/android/app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
              id 'kotlin-android'
              id 'kotlin-kapt'
          }
          android {
              namespace 'com.cdi.tuner'
              compileSdk 34
              defaultConfig {
                  applicationId "com.cdi.tuner"
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildFeatures {
                  viewBinding true
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              kotlinOptions { jvmTarget = '17' }
          }
          dependencies {
              implementation 'androidx.core:core-ktx:1.12.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              implementation 'androidx.navigation:navigation-fragment-ktx:2.7.6'
              implementation 'androidx.navigation:navigation-ui-ktx:2.7.6'
              implementation 'androidx.lifecycle:lifecycle-viewmodel-ktx:2.7.0'
              implementation 'androidx.lifecycle:lifecycle-livedata-ktx:2.7.0'
              implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.7.0'
              implementation 'androidx.room:room-runtime:2.6.1'
              implementation 'androidx.room:room-ktx:2.6.1'
              kapt 'androidx.room:room-compiler:2.6.1'
              implementation 'com.github.mik3y:usb-serial-for-android:3.7.0'
              implementation 'com.github.PhilJay:MPAndroidChart:v3.1.0'
              implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'
          }
          EOF

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle Wrapper
        run: |
          cd CDI_Tuner/android
          gradle wrapper --gradle-version 8.2

      - name: Make gradlew executable
        run: chmod +x CDI_Tuner/android/gradlew

      - name: Build Debug APK
        run: |
          cd CDI_Tuner/android
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CDI-Tuner-APK
          path: CDI_Tuner/android/app/build/outputs/apk/debug/app-debug.apk
