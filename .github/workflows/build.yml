name: Build CDI Tuner APK v2

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract ZIP project
        run: unzip CDI_Tuner_App.zip

      - name: Replace updated files
        run: |
          # Copy semua file yang diupdate dari repo ke project
          cp -f updated_files/MainActivity.kt \
            CDI_Tuner/android/app/src/main/java/com/cdi/tuner/MainActivity.kt
          cp -f updated_files/MainViewModel.kt \
            CDI_Tuner/android/app/src/main/java/com/cdi/tuner/viewmodel/MainViewModel.kt
          cp -f updated_files/MonitorFragment.kt \
            CDI_Tuner/android/app/src/main/java/com/cdi/tuner/ui/monitor/MonitorFragment.kt
          cp -f updated_files/AdvanceMapFragment.kt \
            CDI_Tuner/android/app/src/main/java/com/cdi/tuner/ui/advancemap/AdvanceMapFragment.kt
          cp -f updated_files/PresetsFragment.kt \
            CDI_Tuner/android/app/src/main/java/com/cdi/tuner/ui/presets/PresetsFragment.kt
          cp -f updated_files/activity_main.xml \
            CDI_Tuner/android/app/src/main/res/layout/activity_main.xml
          cp -f updated_files/fragment_monitor.xml \
            CDI_Tuner/android/app/src/main/res/layout/fragment_monitor.xml
          cp -f updated_files/fragment_advance_map.xml \
            CDI_Tuner/android/app/src/main/res/layout/fragment_advance_map.xml
          cp -f updated_files/fragment_presets.xml \
            CDI_Tuner/android/app/src/main/res/layout/fragment_presets.xml
          cp -f updated_files/item_preset.xml \
            CDI_Tuner/android/app/src/main/res/layout/item_preset.xml

      - name: Fix gradle.properties
        run: |
          cat > CDI_Tuner/android/gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          kotlin.code.style=official
          EOF

      - name: Fix XML layout files
        run: |
          python3 << 'PYEOF'
          import os, re
          layout_dir = "CDI_Tuner/android/app/src/main/res/layout"
          for fname in os.listdir(layout_dir):
              if fname.endswith(".xml"):
                  path = os.path.join(layout_dir, fname)
                  with open(path, "r", encoding="utf-8") as f:
                      content = f.read()
                  fixed = re.sub(r'&(?!(amp|lt|gt|quot|apos|#)\w*;)', '&amp;', content)
                  with open(path, "w", encoding="utf-8") as f:
                      f.write(fixed)
          print("XML fixed!")
          PYEOF

      - name: Create launcher icons
        run: |
          python3 << 'PYEOF'
          import os, struct, zlib

          def create_png(size):
              def chunk(name, data):
                  c = name + data
                  return struct.pack('>I', len(data)) + c + struct.pack('>I', zlib.crc32(c) & 0xffffffff)
              sig  = b'\x89PNG\r\n\x1a\n'
              ihdr = chunk(b'IHDR', struct.pack('>IIBBBBB', size, size, 8, 2, 0, 0, 0))
              pixels = []
              for y in range(size):
                  row = b'\x00'
                  for x in range(size):
                      cx, cy = size//2, size//2
                      r = size//2 - 2
                      if (x-cx)**2 + (y-cy)**2 <= r**2:
                          row += b'\xFF\x57\x22'
                      else:
                          row += b'\x12\x12\x12'
                  pixels.append(row)
              raw = b''.join(pixels)
              idat = chunk(b'IDAT', zlib.compress(raw))
              iend = chunk(b'IEND', b'')
              return sig + ihdr + idat + iend

          sizes = {'mipmap-mdpi':48,'mipmap-hdpi':72,'mipmap-xhdpi':96,'mipmap-xxhdpi':144,'mipmap-xxxhdpi':192}
          base = 'CDI_Tuner/android/app/src/main/res'
          for folder, size in sizes.items():
              path = os.path.join(base, folder)
              os.makedirs(path, exist_ok=True)
              png = create_png(size)
              with open(os.path.join(path, 'ic_launcher.png'), 'wb') as f: f.write(png)
              with open(os.path.join(path, 'ic_launcher_round.png'), 'wb') as f: f.write(png)
          print("Icons created!")
          PYEOF

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle Wrapper
        run: |
          cd CDI_Tuner/android
          gradle wrapper --gradle-version 8.2

      - name: Make gradlew executable
        run: chmod +x CDI_Tuner/android/gradlew

      - name: Build Debug APK
        run: |
          cd CDI_Tuner/android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CDI-Tuner-v2-APK
          path: CDI_Tuner/android/app/build/outputs/apk/debug/app-debug.apk
